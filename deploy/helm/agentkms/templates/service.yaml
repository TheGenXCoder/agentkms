apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentkms.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentkms.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: api
      protocol: TCP
      name: api
  selector:
    {{- include "agentkms.selectorLabels" . | nindent 4 }}
