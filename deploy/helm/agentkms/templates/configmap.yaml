apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agentkms.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentkms.labels" . | nindent 4 }}
data:
  config.yaml: |
    environment: {{ .Values.config.environment | quote }}
    log_level: {{ .Values.config.logLevel | quote }}
    vault:
      address: {{ .Values.openbao.address | quote }}
      transit_mount: {{ .Values.openbao.transitMount | quote }}
      kv_mount: {{ .Values.openbao.kvMount | quote }}
      pki_mount: {{ .Values.openbao.pkiMount | quote }}
    mtls:
      enabled: {{ .Values.config.mtls.enabled }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agentkms.fullname" . }}-policy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentkms.labels" . | nindent 4 }}
data:
  policy.yaml: |
{{ .Values.policy.rules | indent 4 }}

---
{{- if .Values.vaultAgent.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agentkms.fullname" . }}-vault-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentkms.labels" . | nindent 4 }}
data:
  agent.hcl: |
    vault {
      address = {{ .Values.openbao.address | quote }}
    }
    auto_auth {
      method "kubernetes" {
        mount_path = {{ .Values.vaultAgent.authPath | quote }}
        config = {
          role = {{ .Values.vaultAgent.role | quote }}
        }
      }
      sink "file" {
        config = {
          path = "/vault/secrets/token"
        }
      }
    }
{{- end }}
