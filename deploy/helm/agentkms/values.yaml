# =============================================================================
# AgentKMS Helm Chart — Default Values
# =============================================================================

image:
  repository: localhost:30500/agentkms/server
  tag: v0.3.0
  pullPolicy: Always

replicaCount: 3

service:
  type: ClusterIP
  port: 8443

# Resource limits
resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# ── Server listen address ──────────────────────────────────────────────────────
server:
  # Port the agentkms binary listens on (set via AGENTKMS_ADDR env var).
  port: 8443

# ── OpenBao / Vault backend ───────────────────────────────────────────────────
openbao:
  address: "http://openbao.openbao.svc.cluster.local:8200"
  transitMount: "transit"
  kvMount: "kv"
  pkiMount: "pki"

# ── Vault token — injected via pre-existing external secret ──────────────────
# The vault-agent init container pattern has been replaced with a static token
# secret managed outside the chart (populated by OpenBao Kubernetes auth).
vaultAgent:
  enabled: false

vaultToken:
  # Name of the existing Secret that holds the vault token (key: token).
  secretName: agentkms-vault-token

# ── TLS ───────────────────────────────────────────────────────────────────────
tls:
  enabled: true
  # Name of the existing TLS Secret for the server certificate.
  serverSecretName: agentkms-server-tls
  # Name of the existing TLS Secret that holds the CA certificate.
  caSecretName: agentkms-ca-tls
  certPath: /etc/agentkms/tls/tls.crt
  keyPath: /etc/agentkms/tls/tls.key
  caPath: /etc/agentkms/tls/ca.crt

# ── ELK / Audit logging ───────────────────────────────────────────────────────
elk:
  address: "http://elasticsearch.logging.svc.cluster.local:9200"
  index: "agentkms-audit"

# ── Service configuration ─────────────────────────────────────────────────────
config:
  environment: "dev"
  logLevel: "info"
  mtls:
    enabled: false

# ── Policy ────────────────────────────────────────────────────────────────────
policy:
  path: /etc/agentkms/policy/policy.yaml
  # Policy rules rendered into the agentkms-policy ConfigMap.
  rules: |
    version: 1
    rules:
      - id: platform-team-sign
        effect: allow
        match:
          identity:
            team_id: "platform-team"
          operations: ["sign", "rotate_key", "list_keys"]
        description: Platform team can sign and list keys

      - id: platform-team-encrypt
        effect: allow
        match:
          identity:
            team_id: "platform-team"
          operations: ["encrypt", "decrypt"]
        description: Platform team can encrypt and decrypt

      - id: stub-allow-all
        effect: allow
        match:
          identity:
            caller_id_pattern: "*"
          operations: ["sign", "encrypt", "decrypt", "list_keys", "rotate_key", "credential_vend"]
        description: T1 POC — allow all callers (replace when A-04 token auth is wired)

# ── RBAC ──────────────────────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: agentkms

rbac:
  create: true

# ── Pod security ──────────────────────────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

# ── Probes ────────────────────────────────────────────────────────────────────
livenessProbe:
  tcpSocket:
    port: api
  initialDelaySeconds: 10
  periodSeconds: 30
  failureThreshold: 3
  successThreshold: 1
  timeoutSeconds: 1

readinessProbe:
  tcpSocket:
    port: api
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3
  successThreshold: 1
  timeoutSeconds: 1

# ── Horizontal Pod Autoscaler ─────────────────────────────────────────────────
hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetRPS: 500

# ── Monitoring ────────────────────────────────────────────────────────────────
monitoring:
  serviceMonitor:
    # Requires Prometheus Operator CRDs — disable if not installed on target cluster.
    enabled: false
    interval: 30s
    path: /metrics
    labels:
      release: monitoring

# ── Affinity / topology ───────────────────────────────────────────────────────
affinity: {}
tolerations: []
nodeSelector: {}
