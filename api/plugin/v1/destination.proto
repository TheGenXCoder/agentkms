syntax = "proto3";

// Package agentkms.plugin.v1 — Destination Plugin Interface
//
// This file defines the DestinationDelivererService wire protocol. It is
// intentionally in the same proto package as plugin.proto so that shared
// types (KindRequest, KindResponse, PluginInfo) can be reused without import
// cycles, and so that a single protoc invocation regenerates both files.
//
// Regenerate after editing:
//
//   protoc \
//     -I /opt/homebrew/Cellar/protobuf/34.1/include \
//     -I api/plugin/v1 \
//     --go_out=api/plugin/v1 \
//     --go_opt=paths=source_relative \
//     --go-grpc_out=api/plugin/v1 \
//     --go-grpc_opt=paths=source_relative \
//     api/plugin/v1/destination.proto
//
// Wire encoding: standard protobuf binary (proto3). Same as plugin.proto.
// Python destination plugins generated by grpc_tools.protoc speak this
// encoding natively. Do NOT reintroduce the JSON codec removed in ef5fd5a1.

package agentkms.plugin.v1;

option go_package = "github.com/agentkms/agentkms/api/plugin/v1;pluginv1";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "plugin.proto";

// ── Shared error classification ───────────────────────────────────────────────

// DestinationErrorCode classifies delivery and revocation errors so the
// orchestrator can make retry decisions without parsing error strings.
//
// This enum is new in the destination interface. It is not retrofitted into
// plugin.proto's existing *Response messages (that is a separate decision for
// the coordinator — see OQ-5 in the spec doc).
enum DestinationErrorCode {
  // DESTINATION_ERROR_UNSPECIFIED must not appear in real responses.
  // A plugin that returns this code is violating the contract.
  DESTINATION_ERROR_UNSPECIFIED = 0;

  // DESTINATION_OK indicates success. error_message must be empty.
  DESTINATION_OK = 1;

  // DESTINATION_TRANSIENT indicates a failure the orchestrator should retry
  // (network timeout, rate limit, temporary service unavailability).
  DESTINATION_TRANSIENT = 2;

  // DESTINATION_PERMANENT indicates a failure requiring operator intervention
  // (target does not exist, insufficient permissions, unsupported operation).
  DESTINATION_PERMANENT = 3;

  // DESTINATION_GENERATION_REGRESSION is returned when the request's
  // generation is less than the last successfully delivered generation.
  // This is always a permanent error — the orchestrator must not retry.
  DESTINATION_GENERATION_REGRESSION = 4;

  // DESTINATION_TARGET_NOT_FOUND means target_id does not identify a known
  // resource at the destination (e.g. repository not found, namespace missing).
  // Always permanent.
  DESTINATION_TARGET_NOT_FOUND = 5;

  // DESTINATION_PERMISSION_DENIED means the plugin's service account lacks
  // write access to the target. Always permanent.
  DESTINATION_PERMISSION_DENIED = 6;
}

// ── ValidateDestination RPCs ──────────────────────────────────────────────────

// ValidateDestinationRequest is the input to DestinationDelivererService.Validate.
// No credential value is passed — this is a pre-flight connectivity and
// permission check only.
message ValidateDestinationRequest {
  // params holds kind-specific destination configuration (e.g. GitHub token,
  // k8s kubeconfig context, Vault address). Shape defined by each plugin kind.
  // Must not contain any secret values from the credential being delivered.
  google.protobuf.Struct params = 1;
}

// ValidateDestinationResponse is the output of DestinationDelivererService.Validate.
// A failed Validate is always treated as a permanent configuration error by the
// orchestrator — there is no is_transient field here.
message ValidateDestinationResponse {
  // error_code classifies the failure. DESTINATION_OK on success.
  DestinationErrorCode error_code = 1;

  // error_message is a human-readable description of the failure. Empty on success.
  // Must not contain secret material (params values, credential bytes).
  string error_message = 2;
}

// ── Deliver RPCs ──────────────────────────────────────────────────────────────

// DeliverRequest is the input to DestinationDelivererService.Deliver.
message DeliverRequest {
  // target_id is the opaque, kind-scoped identifier for the specific secret
  // slot at the destination.
  //
  // Format is defined per plugin kind (see spec §7.3). Examples:
  //   "owner/repo:SECRET_NAME"          — github-secret
  //   "namespace/secret-name:key"       — k8s-secret
  //   "/etc/envs/prod.env:API_KEY"      — env-file
  //   "secret/data/myapp:api_key"       — vault-kv
  //   "myservice.service:MY_CRED"       — systemd-creds
  //
  // The orchestrator treats this field as opaque. Plugins must not rely on
  // the orchestrator parsing or validating the format.
  string target_id = 1;

  // credential_value is the raw credential bytes to write to the target.
  // SECURITY: Plugins must not log this field. Zero the buffer after use
  // where the runtime allows it.
  bytes credential_value = 2;

  // generation is a monotonically increasing rotation counter assigned by
  // the orchestrator. Starts at 1 for the first delivery of a credential;
  // increments by 1 on each rotation.
  //
  // Plugins must reject requests where generation < last_delivered_generation
  // with DESTINATION_GENERATION_REGRESSION.
  uint64 generation = 3;

  // delivery_id is a UUID v4 assigned by the orchestrator for this rotation
  // event (not this individual RPC call). Retries of the same rotation carry
  // the same delivery_id so plugins can detect and de-duplicate retry calls.
  string delivery_id = 4;

  // ttl_seconds is the credential's expected lifetime from issuance, in seconds.
  // Informational hint only. Destinations that support secret expiry metadata
  // may use this to configure TTL at the target; others ignore it.
  int64 ttl_seconds = 5;

  // expires_at is the wall-clock expiry of the credential.
  // Informational hint. Same semantics as ttl_seconds.
  google.protobuf.Timestamp expires_at = 6;

  // requester_id is the stable identity string of the entity that triggered
  // this vend (from mTLS cert CN or AgentKMS identity token).
  // Write to destination-side metadata where supported; used for attribution.
  // Must be treated as a label/annotation, not secret material.
  string requester_id = 7;

  // credential_uuid is the UUID of the VendedCredential this delivery
  // corresponds to. Used by the orchestrator for audit correlation between
  // the vend event and the delivery event.
  string credential_uuid = 8;

  // params holds kind-specific delivery parameters.
  // Shape is defined per plugin kind. Examples:
  //   github-secret: {"visibility": "selected", "selected_repository_ids": [...]}
  //   k8s-secret:    {"secret_type": "Opaque"}
  //   vault-kv:      {"mount": "secret", "cas_required": true}
  google.protobuf.Struct params = 9;
}

// DeliverResponse is the output of DestinationDelivererService.Deliver.
message DeliverResponse {
  // error_code classifies the result. DESTINATION_OK on success.
  DestinationErrorCode error_code = 1;

  // error_message is a human-readable description of the failure. Empty on success.
  // Must not contain credential_value bytes.
  string error_message = 2;
}

// ── Revoke RPCs ───────────────────────────────────────────────────────────────

// RevokeDestinationRequest is the input to DestinationDelivererService.Revoke.
message RevokeDestinationRequest {
  // target_id identifies the secret slot to remove. Same format as DeliverRequest.
  string target_id = 1;

  // credential_uuid is the UUID of the credential being decommissioned.
  // Used for audit correlation.
  string credential_uuid = 2;

  // generation is the generation number of the credential being revoked.
  // Plugins may use this to verify they are revoking the expected version
  // rather than a newer credential written by a concurrent rotation.
  uint64 generation = 3;

  // params holds kind-specific parameters needed to reach the target.
  // Same shape as DeliverRequest.params for the same kind.
  google.protobuf.Struct params = 4;
}

// RevokeDestinationResponse is the output of DestinationDelivererService.Revoke.
message RevokeDestinationResponse {
  // error_code classifies the result. DESTINATION_OK on success (including
  // the case where the credential was already absent — Revoke is idempotent).
  DestinationErrorCode error_code = 1;

  // error_message is a human-readable description of the failure. Empty on success.
  string error_message = 2;
}

// ── Health RPCs ───────────────────────────────────────────────────────────────

// HealthRequest is intentionally empty, mirroring KindRequest.
// The host does not need to pass context to the plugin for a health check;
// connectivity is the plugin's sole concern.
message HealthRequest {}

// HealthResponse is the output of DestinationDelivererService.Health.
message HealthResponse {
  // error_code is DESTINATION_OK when the destination is reachable and
  // the plugin's credentials are valid. Any other value means unhealthy.
  DestinationErrorCode error_code = 1;

  // error_message describes the health failure. Empty when healthy.
  string error_message = 2;

  // latency_ms is the round-trip time of the connectivity probe in milliseconds.
  // Optional (zero if not measured). Used for observability dashboards.
  int64 latency_ms = 3;
}

// ── Service definition ────────────────────────────────────────────────────────

// DestinationDelivererService is the plugin-side credential delivery interface.
// Plugins that write credentials to consumer-side targets implement this service.
//
// Relationship to provider services:
//   - CredentialVenderService (plugin.proto) mints credentials.
//   - DestinationDelivererService (this file) delivers them to targets.
//
// Handshake: uses the same HandshakeConfig as provider plugins
// (ProtocolVersion=1, MagicCookieKey="PLUGIN_MAGIC_COOKIE",
// MagicCookieValue="agentkms_plugin_v1"). See internal/plugin/plugins.go.
//
// PluginMap key: "destination_deliverer" (add to PluginMap in plugins.go).
//
// A plugin binary may implement both provider services (plugin.proto) and
// DestinationDelivererService in the same binary. The host dispenses each
// service independently.
service DestinationDelivererService {
  // Kind returns the destination kind this plugin handles (e.g. "github-secret").
  // Called once at startup; the result is stored on the adapter and used
  // to register the plugin in the destination registry.
  // Mirrors KindRequest/KindResponse from plugin.proto — reuse those message types.
  rpc Kind(KindRequest) returns (KindResponse);

  // Capabilities returns the feature set and API version this service supports.
  // Called once at startup after Kind(). Reuses CapabilitiesRequest/Response
  // from plugin.proto (same package).
  rpc Capabilities(CapabilitiesRequest) returns (CapabilitiesResponse);

  // Validate performs a pre-flight connectivity and permission check.
  // Must not write secret material. Must complete within 10 seconds.
  // A non-OK response is treated as a permanent configuration error.
  rpc Validate(ValidateDestinationRequest) returns (ValidateDestinationResponse);

  // Deliver writes credential_value to the target identified by target_id.
  // Idempotent: multiple calls with the same delivery_id and generation produce
  // the same observable outcome. Plugins must not create duplicate entries.
  // See spec §4.3 and §5 for the full idempotency contract.
  rpc Deliver(DeliverRequest) returns (DeliverResponse);

  // Revoke removes the credential from the target identified by target_id.
  // Idempotent: returns DESTINATION_OK if the credential is already absent.
  // Destinations that cannot remove credentials return DESTINATION_PERMANENT
  // with a descriptive error_message — this does not block the broader
  // revocation flow (the orchestrator logs and continues).
  rpc Revoke(RevokeDestinationRequest) returns (RevokeDestinationResponse);

  // Health verifies that the destination is reachable and the plugin's
  // service account credentials are valid. Must complete within 5 seconds.
  // Called by the host health loop every 30 seconds. Must not write data.
  rpc Health(HealthRequest) returns (HealthResponse);
}
