apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentkms.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentkms.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agentkms.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Force pod restart when the configmap changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "agentkms.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}

      containers:
        - name: agentkms
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: api
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            - name: AGENTKMS_VAULT_ADDR
              value: {{ .Values.openbao.address | quote }}
            - name: AGENTKMS_VAULT_TOKEN_PATH
              value: "/vault/secrets/token"
            - name: AGENTKMS_ENV
              value: {{ .Values.config.environment | quote }}
            - name: AGENTKMS_LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: AGENTKMS_POLICY
              value: {{ .Values.policy.path | quote }}
            - name: AGENTKMS_ELK_ADDR
              value: {{ .Values.elk.address | quote }}
            - name: AGENTKMS_ELK_INDEX
              value: {{ .Values.elk.index | quote }}
            - name: AGENTKMS_ADDR
              value: ":{{ .Values.server.port }}"
            {{- if .Values.tls.enabled }}
            - name: AGENTKMS_TLS_CERT
              value: {{ .Values.tls.certPath | quote }}
            - name: AGENTKMS_TLS_KEY
              value: {{ .Values.tls.keyPath | quote }}
            - name: AGENTKMS_TLS_CA
              value: {{ .Values.tls.caPath | quote }}
            {{- end }}
          volumeMounts:
            - name: vault-token
              mountPath: /vault/secrets
              readOnly: true
            - name: config
              mountPath: /etc/agentkms
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: policy
              mountPath: /etc/agentkms/policy
              readOnly: true
            {{- if .Values.tls.enabled }}
            - name: server-tls
              mountPath: /etc/agentkms/tls
              readOnly: true
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

      volumes:
        - name: vault-token
          secret:
            secretName: {{ .Values.vaultToken.secretName }}
            items:
              - key: token
                path: token
        - name: config
          configMap:
            name: {{ include "agentkms.fullname" . }}-config
        - name: tmp
          emptyDir: {}
        - name: policy
          configMap:
            name: {{ include "agentkms.fullname" . }}-policy
        {{- if .Values.tls.enabled }}
        - name: server-tls
          projected:
            sources:
              - secret:
                  name: {{ .Values.tls.serverSecretName }}
                  items:
                    - key: tls.crt
                      path: tls.crt
                    - key: tls.key
                      path: tls.key
              - secret:
                  name: {{ .Values.tls.caSecretName }}
                  items:
                    - key: tls.crt
                      path: ca.crt
        {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
